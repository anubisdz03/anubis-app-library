name: Notify Telegram on New YouTube Video

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install rss-parser node-fetch

      - name: Run YouTube notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CHANNEL_ID: UCz7Q8mpWfogkgSaZdBbxOVw
        run: node .github/scripts/youtube_notify.js
